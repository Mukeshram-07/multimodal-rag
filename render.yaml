services:
  - type: web
    name: rag-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_BASE
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_db
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: chroma-data
      mountPath: /app/chroma_db
      sizeGB: 5
    healthCheckPath: /health
